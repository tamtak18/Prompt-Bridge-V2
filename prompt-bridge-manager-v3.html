<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Prompt Bridge V2 Builder (Win) - takasoft</title>
    <style>
        :root {
            --main-color: #ff8c00;
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --text-color: #ff8c00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Consolas, monospace;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            border: 2px solid var(--main-color);
            padding: 30px;
            box-shadow: 0 0 25px rgba(255, 140, 0, 0.4);
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            font-size: 2.2em;
            letter-spacing: 4px;
            border-bottom: 2px solid var(--main-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .path-config {
            background: #222;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            border-left: 5px solid var(--main-color);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid #333;
            padding: 15px;
            border-radius: 5px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
            color: #aaa;
        }

        input,
        textarea {
            width: 100%;
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            height: 400px;
            color: #0f0;
            font-family: 'Consolas', monospace;
            font-size: 0.95em;
        }

        .btn-build {
            background: var(--main-color);
            color: #000;
            border: none;
            padding: 18px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2em;
            width: 100%;
            margin-top: 25px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .output-area {
            margin-top: 30px;
            display: none;
            background: #000;
            padding: 20px;
            border: 2px solid #0f0;
            border-radius: 5px;
        }

        .cmd-box {
            position: relative;
            background: #050505;
            padding: 15px;
            margin-top: 10px;
            border-radius: 4px;
        }

        code {
            color: #0f0;
            word-break: break-all;
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            font-size: 0.85em;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>PROMPT BRIDGE V2 BUILDER (WINDOWS)</h1>

        <div class="path-config">
            <label>📁 プロジェクトフォルダのパス:</label>
            <input type="text" id="workDir" value="C:\dev\prompt-bridge-v2">
        </div>

        <div class="grid">
            <div class="card">
                <label>PB1: メニュー見出し</label>
                <input type="text" id="label1" value="PB1: コード解説">
                <label>PB1: プロンプト</label>
                <textarea id="p1">以下のソースコードについて，以下の構成で解説してください．
1. 概要：このコードの主な役割を1行で要約
2. 処理フロー：ロジックをステップバイステップで論理的に説明
3. キーポイント：重要な変数や条件分岐，アルゴリズムの意図
4. 補足：使用されているライブラリや言語特有の記述があれば解説

解析対象のコードは以下の通りです：</textarea>
            </div>
            <div class="card">
                <label>PB2: メニュー見出し</label>
                <input type="text" id="label2" value="PB2: テスト観点">
                <label>PB2: プロンプト</label>
                <textarea id="p2">以下のソースコードに対するテスト項目（テスト観点）を，マークダウンの表形式で洗い出してください．
列項目：[テスト種別(正常/異常/境界値), 確認内容, 期待される結果]
特に，実行時にエラーが発生しやすい箇所や，考慮漏れが起きそうなコーナーケースを重点的に抽出してください．

解析対象のコードは以下の通りです：</textarea>
            </div>
            <div class="card">
                <label>PB3: メニュー見出し</label>
                <input type="text" id="label3" value="PB3: CDIレビュー">
                <label>PB3: プロンプト</label>
                <textarea id="p3">以下のソースコードを「CDI（信頼性・保守性・効率性）」の観点から厳格にレビューしてください．
- 改善が必要な箇所の指摘と，その理由（アンチパターン等）
- リファクタリング後の修正案（具体的なコード例）
- セキュリティ上の懸念点（もしあれば）

解析対象のコードは以下の通りです：</textarea>
            </div>
        </div>

        <button class="btn-build" onclick="build()">Windows用ビルドコマンド生成</button>

        <div id="output" class="output-area">
            <label style="color: #0f0;">🚀 PowerShell用コマンド:</label>
            <div class="cmd-box">
                <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">COPY</button>
                <code id="fullCommand"></code>
            </div>
        </div>
    </div>

    <script>
        function build() {
            const workDir = document.getElementById('workDir').value.replace(/\\$/, "");
            const vals = {
                l1: document.getElementById('label1').value,
                p1: document.getElementById('p1').value,
                l2: document.getElementById('label2').value,
                p2: document.getElementById('p2').value,
                l3: document.getElementById('label3').value,
                p3: document.getElementById('p3').value
            };

            const packageJson = {
                "name": "prompt-bridge-v2",
                "displayName": "Prompt Bridge V2",
                "version": "2.2.0", // バージョンを更新
                "publisher": "takasoft",
                "engines": { "vscode": "^1.74.0" },
                "main": "./extension.js",
                "contributes": {
                    "commands": [
                        { "command": "prompt-bridge-v2.sendToRoo1", "title": vals.l1 },
                        { "command": "prompt-bridge-v2.sendToRoo2", "title": vals.l2 },
                        { "command": "prompt-bridge-v2.sendToRoo3", "title": vals.l3 }
                    ],
                    "submenus": [{ "id": "prompt-bridge-v2.submenu", "label": "Prompt Bridge" }],
                    "menus": {
                        "editor/context": [{ "submenu": "prompt-bridge-v2.submenu", "when": "editorHasSelection", "group": "navigation" }],
                        "prompt-bridge-v2.submenu": [
                            { "command": "prompt-bridge-v2.sendToRoo1", "group": "1_main@1" },
                            { "command": "prompt-bridge-v2.sendToRoo2", "group": "1_main@2" },
                            { "command": "prompt-bridge-v2.sendToRoo3", "group": "1_main@3" }
                        ]
                    },
                    "configuration": {
                        "title": "Prompt Bridge V2",
                        "properties": {
                            "promptBridgeV2.customPrompt1": { "type": "string", "default": vals.p1 },
                            "promptBridgeV2.customPrompt2": { "type": "string", "default": vals.p2 },
                            "promptBridgeV2.customPrompt3": { "type": "string", "default": vals.p3 }
                        }
                    }
                }
            };

            const extensionJs = `const vscode = require('vscode');
const ROO_EXTENSION_ID = 'RooVeterinaryInc.roo-cline';

async function sendToRoo(promptKey) {
    const editor = vscode.window.activeTextEditor;
    if (!editor) return;
    const selection = editor.selection;
    const text = editor.document.getText(selection);
    if (!text || text.trim().length === 0) {
        vscode.window.showWarningMessage('テキストを選択してから実行してください．');
        return;
    }
    const config = vscode.workspace.getConfiguration('promptBridgeV2');
    const customPrompt = config.get(promptKey);

    const finalText = customPrompt + "\\n\\n" + text;

    await vscode.env.clipboard.writeText(finalText);
    try {
        const rooExtension = vscode.extensions.getExtension(ROO_EXTENSION_ID);
        if (!rooExtension) {
            vscode.window.showInformationMessage('クリップボードにコピーしました（Roo Code未検出）');
            return;
        }
        if (!rooExtension.isActive) await rooExtension.activate();
        const api = rooExtension.exports;
        if (api && typeof api.sendMessage === 'function') {
            await api.sendMessage(finalText);
            vscode.window.setStatusBarMessage('✓ Roo Codeへ送信完了', 3000);
        }
    } catch (error) {
        vscode.window.showErrorMessage('連携エラー：クリップボードを確認してください．');
    }
}

function activate(context) {
    context.subscriptions.push(
        vscode.commands.registerCommand('prompt-bridge-v2.sendToRoo1', () => sendToRoo('customPrompt1')),
        vscode.commands.registerCommand('prompt-bridge-v2.sendToRoo2', () => sendToRoo('customPrompt2')),
        vscode.commands.registerCommand('prompt-bridge-v2.sendToRoo3', () => sendToRoo('customPrompt3'))
    );
}
module.exports = { activate, deactivate: () => {} };`;

            // 【重要】余計な.replace(...)をすべて削除しました
            const pkgJsonStr = JSON.stringify(packageJson, null, 2);
            const extJsStr = extensionJs;

            const fullCommand = `if (!(Test-Path "${workDir}")) { New-Item -ItemType Directory -Path "${workDir}" }; cd "${workDir}"; Remove-Item -ErrorAction SilentlyContinue *.vsix; @'\n${pkgJsonStr}\n'@ | Out-File -Encoding utf8 package.json; @'\n${extJsStr}\n'@ | Out-File -Encoding utf8 extension.js; npx @vscode/vsce package --skip-license --allow-missing-repository --allow-star-activation`;

            document.getElementById('fullCommand').innerText = fullCommand;
            document.getElementById('output').style.display = 'block';
        }

        async function copyToClipboard() {
            const code = document.getElementById('fullCommand').innerText;
            await navigator.clipboard.writeText(code);
            document.getElementById('copyBtn').innerText = "COPIED!";
        }
    </script>
</body>

</html>
